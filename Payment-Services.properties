
server.port=7508

# ===============================
# DATABASE
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/Payment_Db
spring.datasource.username=postgres
spring.datasource.password=9305
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework=INFO
logging.level.com.payment=DEBUG

# ===============================
# FEIGN CLIENT CONFIG
# ===============================
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

# ===============================
# SERVICE URLS (IMPORTANT)
# ===============================
wallet.service.url=http://localhost:7507
transaction.service.url=http://localhost:7506
kyc.service.url=http://localhost:7501

# ===============================
# JWT
# ===============================
jwt.secret=mysecretkey

# ===============================
# SWAGGER
# ===============================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
